<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>MathMon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@700;800;900&family=Zen+Maru+Gothic:wght@700;900&display=swap" rel="stylesheet" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="app">

  <div id="antennae" aria-hidden="true">
    <div class="ant" id="ant-l"><div class="ant-stem"></div><div class="ant-ball"></div></div>
    <div class="ant" id="ant-r"><div class="ant-stem"></div><div class="ant-ball"></div></div>
  </div>

  <!-- メイン: 顔 → 式 → 手書き → 回答 → キーボード → 次へ -->
  <main id="main-content">
    <div id="character" aria-hidden="true">
      <div id="eyes">
        <div class="eye-unit">
          <div class="brow"></div>
          <div class="eye" id="eye-l"><div class="pupil" id="pup-l"></div></div>
        </div>
        <div class="eye-unit">
          <div class="brow"></div>
          <div class="eye" id="eye-r"><div class="pupil" id="pup-r"></div></div>
        </div>
      </div>
      <div id="smile" aria-hidden="true"></div>
      <div id="monster-crown" aria-hidden="true"></div>
      <div id="monster-cape"  aria-hidden="true"></div>
    </div>

    <!-- Problem -->
  <div id="problem-card">
    <div id="prob-label"></div>
    <div id="prob-eq">
      <span id="num-a" class="num-pop"></span>
      <span id="op-sym" class="num-pop"></span>
      <span id="num-b" class="num-pop"></span>
      <span id="eq-sym" class="num-pop">=</span>
      <span id="ans-mark" class="num-pop">?</span>
    </div>
  </div>

  <!-- Answer zone -->
  <div id="answer-zone">
    <div id="answer-mode-wrap">
      <div id="canvas-wrap" class="mode-panel">
        <canvas id="draw-canvas" width="560" height="280" aria-label="こたえをかくところ"></canvas>
        <button id="canvas-clear-btn" type="button" aria-label="けす">けす</button>
        <button id="numpad-toggle" type="button" aria-label="すうじキーボード">123</button>
      </div>

      <div id="numpad" class="hidden mode-panel">
        <div id="numpad-display-wrap">
          <button id="handwrite-toggle" type="button" aria-label="手書きにもどる">かく</button>
          <div id="numpad-display" class="num-pop">
            <canvas id="numpad-line-canvas" aria-hidden="true"></canvas>
          </div>
        </div>
        <div id="numpad-grid">
          <button class="nk" data-val="1">1</button>
          <button class="nk" data-val="2">2</button>
          <button class="nk" data-val="3">3</button>
          <button class="nk" data-val="4">4</button>
          <button class="nk" data-val="5">5</button>
          <button class="nk" data-val="6">6</button>
          <button class="nk" data-val="7">7</button>
          <button class="nk" data-val="8">8</button>
          <button class="nk" data-val="9">9</button>
          <button class="nk nk-del" data-val="del" aria-label="けす">✕</button>
          <button class="nk" data-val="0">0</button>
          <button class="nk nk-go" data-val="go">こたえる</button>
        </div>
      </div>
    </div>

    <div id="recognized-wrap">
      <div id="recognized-display" class="recognized-num hidden" aria-live="polite"></div>
    </div>

    <div id="input-actions">
      <button id="done-btn" type="button" class="num-pop">こたえる</button>
    </div>
  </div>

    <div id="feedback" aria-live="assertive"></div>
    <button id="next-btn" class="hidden num-pop" type="button">つぎへ →</button>
  </main>

  <!-- 下部バー: 問題集・機能・ステータス -->
  <footer id="bottom-bar">
    <div id="diff-section">
      <button id="diff-toggle" type="button" aria-label="もんだいしゅう" aria-expanded="false" title="もんだいしゅう">
        <svg id="diff-toggle-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/><path d="M8 7h8"/><path d="M8 11h6"/>
        </svg>
        <span id="diff-toggle-label" class="sr-only">1ねんせい①</span>
      </button>
      <div id="diff-drawer" class="hidden">
        <button class="diff-btn num-pop active" data-diff="easy">1年①</button>
        <button class="diff-btn num-pop" data-diff="medium">1年②</button>
        <button class="diff-btn num-pop" data-diff="normal">2年①</button>
        <button class="diff-btn num-pop" data-diff="hard">2年②</button>
        <button class="diff-btn num-pop" data-diff="mult1">かけ算①</button>
        <button class="diff-btn num-pop" data-diff="mult2">かけ算②</button>
        <button class="diff-btn num-pop" data-diff="div1">わり算①</button>
        <button class="diff-btn num-pop" data-diff="div2">わり算②</button>
      </div>
    </div>
    <nav id="nav" role="status" aria-label="ゲームのじょうきょう">
    <div id="nav-center">
      <div id="prog-wrap"><div id="prog-bar"></div></div>
      <span id="q-val" class="num-pop">1/10</span>
    </div>
    <div id="nav-score">
      <svg width="12" height="12" viewBox="0 0 24 24" aria-hidden="true"><polygon fill="#FFD93D" points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>
      <span id="score-val" class="num-pop">0</span>
    </div>
    </nav>
    <button id="palette-fab" type="button" aria-label="はいけいのいろをかえる">
    <span id="fab-dot"></span>
    </button>
  </footer>

  <!-- カラーピッカー（ボタン押下で表示・色選択で閉じる） -->
  <div id="color-picker-sheet" class="hidden">
    <button id="color-picker-backdrop" aria-label="とじる"></button>
    <div id="color-balls-cup" aria-label="いろをえらぶ"></div>
  </div>

</div>

<div id="burst-layer" aria-hidden="true"></div>

<div id="modal" class="hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div id="modal-box">
    <div id="modal-icon"></div>
    <div id="modal-title">すごい！</div>
    <div id="modal-sub" class="num-pop">0てん</div>
    <button id="modal-btn" type="button">もう一度！</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
<script src="main.js"></script>
</body>
</html>
